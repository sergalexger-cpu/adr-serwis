<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propozycja Strategiczna | Sławomir Celebias • DGSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy: #0a1628;
            --navy-mid: #0f2040;
            --blue: #1a4fa8;
            --blue-bright: #2563eb;
            --gold: #c8a84b;
            --gold-light: #e8c97a;
            --cream: #f5f0e8;
            --text: #1c2333;
            --muted: #64748b;
            --border: rgba(26, 79, 168, 0.15);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #fafaf8;
            color: var(--text);
            overflow-x: hidden;
        }

        /* ─── NAV ─────────────────────────────── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(250, 250, 248, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            transition: box-shadow .3s;
        }
        nav.scrolled { box-shadow: 0 4px 24px rgba(10,22,40,.08); }
        .nav-inner {
            max-width: 1140px; margin: 0 auto;
            padding: 0 32px;
            height: 68px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-logo {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none;
        }
        .nav-logo-icon {
            width: 40px; height: 40px;
            background: var(--navy);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .nav-logo-icon::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 3px; background: var(--gold);
        }
        .nav-logo-icon svg { color: white; width: 20px; height: 20px; }
        .nav-logo-text strong {
            display: block; font-size: 14px; font-weight: 600; color: var(--navy); letter-spacing: -.2px;
        }
        .nav-logo-text span {
            font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; font-weight: 500;
        }
        .nav-links {
            display: flex; gap: 36px; list-style: none;
        }
        .nav-links a {
            font-size: 11px; font-weight: 600; color: var(--muted);
            text-decoration: none; letter-spacing: .12em; text-transform: uppercase;
            transition: color .2s;
        }
        .nav-links a:hover { color: var(--blue); }
        .nav-cta {
            padding: 9px 20px;
            background: var(--navy);
            color: white !important;
            border-radius: 6px;
        }
        .nav-cta:hover { background: var(--blue) !important; color: white !important; }

        /* ─── HERO ────────────────────────────── */
        .hero {
            min-height: 100vh;
            background: var(--navy);
            position: relative;
            display: flex; align-items: center;
            overflow: hidden;
        }
        .hero-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(26,79,168,.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(26,79,168,.07) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at 60% 40%, black 30%, transparent 75%);
        }
        .hero-glow {
            position: absolute;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(26,79,168,.25) 0%, transparent 65%);
            top: -200px; right: -200px;
            pointer-events: none;
        }
        .hero-glow-2 {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(200,168,75,.12) 0%, transparent 65%);
            bottom: -100px; left: 100px;
            pointer-events: none;
        }
        .hero-inner {
            max-width: 1140px; margin: 0 auto; padding: 120px 32px 80px;
            position: relative; z-index: 2;
            display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 14px;
            border: 1px solid rgba(200,168,75,.4);
            border-radius: 100px;
            background: rgba(200,168,75,.08);
            color: var(--gold-light);
            font-size: 10px; font-weight: 600; letter-spacing: .15em; text-transform: uppercase;
            margin-bottom: 28px;
            animation: fadeUp .8s ease both;
        }
        .hero-badge::before {
            content: ''; width: 6px; height: 6px;
            background: var(--gold); border-radius: 50%;
        }
        .hero h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(36px, 4.5vw, 56px);
            color: white;
            line-height: 1.1;
            margin-bottom: 24px;
            animation: fadeUp .8s .1s ease both;
        }
        .hero h1 em {
            font-style: italic;
            color: var(--gold-light);
        }
        .hero-sub {
            color: rgba(255,255,255,.55);
            font-size: 16px; line-height: 1.75;
            margin-bottom: 40px;
            animation: fadeUp .8s .2s ease both;
        }
        .hero-sub strong { color: rgba(255,255,255,.9); }
        .hero-btns {
            display: flex; gap: 14px; flex-wrap: wrap;
            animation: fadeUp .8s .3s ease both;
        }
        .btn-primary {
            padding: 14px 28px;
            background: var(--gold);
            color: var(--navy);
            border-radius: 8px;
            font-weight: 700; font-size: 13px; letter-spacing: .04em;
            text-decoration: none;
            transition: background .2s, transform .2s;
            white-space: nowrap;
        }
        .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
        .btn-ghost {
            padding: 14px 28px;
            border: 1px solid rgba(255,255,255,.2);
            color: rgba(255,255,255,.8);
            border-radius: 8px;
            font-weight: 600; font-size: 13px; letter-spacing: .04em;
            text-decoration: none;
            transition: border-color .2s, background .2s;
            white-space: nowrap;
        }
        .btn-ghost:hover { border-color: rgba(255,255,255,.5); background: rgba(255,255,255,.06); }

        /* Hero right: stats card */
        .hero-card {
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 20px;
            padding: 36px;
            animation: fadeUp .8s .2s ease both;
            backdrop-filter: blur(8px);
        }
        .hero-card-title {
            font-size: 11px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase;
            margin-bottom: 24px; font-weight: 600;
        }
        .stat-row {
            display: flex; align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,.06);
            gap: 16px;
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-icon {
            width: 40px; height: 40px;
            background: rgba(26,79,168,.3);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .stat-icon svg { width: 18px; height: 18px; color: #93b4f0; }
        .stat-value {
            font-family: 'DM Serif Display', serif;
            font-size: 28px; color: white; line-height: 1;
        }
        .stat-label { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 2px; }
        .star-row {
            display: flex; gap: 3px; margin-top: 8px;
        }
        .star-row svg { width: 12px; height: 12px; color: var(--gold); fill: var(--gold); }

        /* ─── SECTION BASE ────────────────────── */
        section { padding: 100px 32px; }
        .container { max-width: 1140px; margin: 0 auto; }

        .section-eyebrow {
            font-size: 10px; font-weight: 700; letter-spacing: .2em;
            text-transform: uppercase; color: var(--blue);
            margin-bottom: 12px;
        }
        .section-title {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(28px, 3.5vw, 42px);
            color: var(--navy); line-height: 1.15; margin-bottom: 16px;
        }
        .section-lead {
            font-size: 17px; color: var(--muted); line-height: 1.7;
            max-width: 560px;
        }

        /* ─── POSITION (Analysis) ─────────────── */
        #strengths { background: white; }
        .strengths-layout {
            display: grid; grid-template-columns: 340px 1fr; gap: 80px; align-items: start;
        }
        .strengths-sticky { position: sticky; top: 90px; }
        .reputation-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px;
            background: #fefce8;
            border: 1px solid #fde047;
            border-radius: 100px;
            font-size: 12px; font-weight: 600; color: #854d0e;
            margin: 20px 0;
        }
        .reputation-badge svg { width: 14px; height: 14px; color: #eab308; fill: #eab308; }
        .divider-line {
            width: 48px; height: 3px;
            background: linear-gradient(90deg, var(--blue), var(--gold));
            border-radius: 2px;
            margin-top: 24px;
        }

        .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card {
            padding: 28px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: #fafaf8;
            position: relative;
            overflow: hidden;
            transition: border-color .2s, transform .2s, box-shadow .2s;
        }
        .card:hover {
            border-color: rgba(26,79,168,.35);
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(10,22,40,.08);
        }
        .card::before {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 3px; height: 100%;
            background: linear-gradient(180deg, var(--blue), var(--gold));
        }
        .card-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px; font-weight: 700; color: var(--blue);
            letter-spacing: .1em; margin-bottom: 14px;
        }
        .card h4 { font-size: 15px; font-weight: 600; margin-bottom: 8px; color: var(--navy); }
        .card p { font-size: 13px; color: var(--muted); line-height: 1.65; }

        /* ─── ROADMAP ─────────────────────────── */
        #roadmap { background: var(--cream); }
        .roadmap-header { text-align: center; margin-bottom: 64px; }
        .roadmap-header .section-lead { margin: 0 auto; }

        .pillars { display: flex; flex-direction: column; gap: 2px; }
        .pillar {
            background: white;
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: box-shadow .2s;
        }
        .pillar:hover { box-shadow: 0 8px 32px rgba(10,22,40,.07); }
        .pillar-header {
            display: grid; grid-template-columns: 80px 1fr auto;
            align-items: center; padding: 28px 36px; gap: 24px;
            cursor: default;
        }
        .pillar-num {
            font-family: 'DM Serif Display', serif;
            font-size: 48px; color: rgba(26,79,168,.12); line-height: 1;
            font-weight: 400;
        }
        .pillar-label {
            font-size: 10px; font-weight: 700; color: var(--blue);
            letter-spacing: .15em; text-transform: uppercase; margin-bottom: 6px;
        }
        .pillar h3 { font-size: 18px; font-weight: 600; color: var(--navy); }
        .pillar-tag {
            padding: 4px 12px;
            border-radius: 100px;
            background: rgba(26,79,168,.08);
            color: var(--blue);
            font-size: 10px; font-weight: 700; letter-spacing: .08em;
            white-space: nowrap;
        }
        .pillar-body {
            padding: 0 36px 28px 140px;
        }
        .pillar-body p {
            font-size: 14px; color: var(--muted); line-height: 1.75;
        }
        .pillar-body .highlight {
            display: inline-block;
            background: rgba(26,79,168,.07);
            color: var(--blue); font-weight: 600;
            padding: 1px 6px; border-radius: 4px;
        }

        /* Pillar 5 special */
        .pillar-5 .pillar-body {
            display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: center;
        }
        .pillar-quote {
            background: var(--navy);
            border-radius: 12px;
            padding: 24px 28px;
            color: rgba(255,255,255,.7);
            font-size: 14px; line-height: 1.65; font-style: italic;
            border-left: 3px solid var(--gold);
        }
        .pillar-quote span { display: block; margin-top: 12px; color: var(--gold-light); font-size: 12px; font-style: normal; font-weight: 600; }

        /* ─── OFFER ───────────────────────────── */
        #model { background: white; }
        .offer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
        .offer-left .section-lead { margin-bottom: 40px; }

        .offer-terms {
            display: flex; flex-direction: column; gap: 0;
            border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden;
            margin-bottom: 36px;
        }
        .term-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .term-row:last-child { border-bottom: none; }
        .term-row .label { color: var(--muted); font-weight: 500; }
        .term-row .value { font-weight: 700; color: var(--navy); }
        .term-row.highlight-row { background: rgba(26,79,168,.03); }

        .offer-card {
            background: var(--navy);
            border-radius: 20px;
            padding: 48px 40px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .offer-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--blue-bright));
        }
        .offer-card-eyebrow {
            font-size: 10px; font-weight: 700; color: var(--gold-light);
            letter-spacing: .2em; text-transform: uppercase; margin-bottom: 20px;
        }
        .big-number {
            font-family: 'DM Serif Display', serif;
            font-size: 80px; color: white; line-height: 1;
            margin-bottom: 4px;
        }
        .big-unit {
            font-size: 14px; color: rgba(255,255,255,.4);
            font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
            margin-bottom: 32px;
        }
        .offer-perks {
            display: flex; flex-direction: column; gap: 12px;
            margin-bottom: 36px;
        }
        .perk {
            display: flex; align-items: center; gap: 12px;
            font-size: 13px; color: rgba(255,255,255,.7);
        }
        .perk-check {
            width: 20px; height: 20px;
            background: rgba(200,168,75,.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .perk-check svg { width: 10px; height: 10px; color: var(--gold); }

        .offer-divider { border: none; border-top: 1px solid rgba(255,255,255,.08); margin: 28px 0; }

        .personal-note {
            font-size: 13px; color: rgba(255,255,255,.45); line-height: 1.7; font-style: italic;
            margin-bottom: 32px;
        }

        .cta-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px;
            background: var(--gold);
            color: var(--navy);
            border-radius: 10px;
            font-weight: 700; font-size: 14px; letter-spacing: .04em;
            text-decoration: none;
            transition: background .2s, transform .2s;
        }
        .cta-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
        .cta-btn svg { width: 16px; height: 16px; }
        .cta-sub {
            text-align: center; font-size: 11px; color: rgba(255,255,255,.3);
            margin-top: 14px; font-family: 'JetBrains Mono', monospace;
        }

        /* ─── FOOTER ──────────────────────────── */
        footer {
            background: var(--navy);
            padding: 40px 32px;
            color: rgba(255,255,255,.3);
        }
        .footer-inner {
            max-width: 1140px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
        }
        .footer-gold { color: var(--gold); }

        /* ─── ANIMATIONS ──────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            opacity: 0; transform: translateY(24px);
            transition: opacity .7s ease, transform .7s ease;
        }
        .reveal.visible { opacity: 1; transform: none; }

        /* ─── RESPONSIVE ──────────────────────── */
        @media (max-width: 900px) {
            .hero-inner { grid-template-columns: 1fr; gap: 48px; padding-top: 100px; }
            .hero-card { max-width: 420px; }
            .strengths-layout { grid-template-columns: 1fr; gap: 48px; }
            .strengths-sticky { position: static; }
            .cards-grid { grid-template-columns: 1fr; }
            .pillar-header { grid-template-columns: 60px 1fr; }
            .pillar-tag { display: none; }
            .pillar-body { padding-left: 84px; }
            .pillar-5 .pillar-body { grid-template-columns: 1fr; }
            .offer-grid { grid-template-columns: 1fr; }
            .nav-links { display: none; }
            .footer-inner { flex-direction: column; gap: 12px; text-align: center; }
        }
    </style>
</head>
<body>

<h
